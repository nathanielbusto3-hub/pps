<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', cursive;
        }
        
        /* Pixel 3D effects */
        .pixel-box {
            box-shadow: 
                -4px 4px 0 0 #000,
                -4px 0 0 0 #000,
                0 4px 0 0 #000;
        }
        
        .pixel-btn {
            box-shadow: 
                -4px 4px 0 0 #000,
                -4px 0 0 0 #000,
                0 4px 0 0 #000;
            transition: all 0.1s;
        }
        
        .pixel-btn:active {
            box-shadow: none;
            transform: translate(-4px, 4px);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .notification {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        .notification-exit {
            animation: slideOut 0.3s ease-out forwards;
        }
        
        .input-focus:focus {
            box-shadow: 
                0 0 0 3px rgba(37, 99, 235, 0.2),
                -4px 4px 0 0 #000,
                -4px 0 0 0 #000,
                0 4px 0 0 #000;
        }
        
        /* Retro pixel background */
        .pixel-bg {
            background-color: #92ccff;
            background-image: linear-gradient(135deg, #86bdf0 25%, transparent 25%),
                              linear-gradient(225deg, #86bdf0 25%, transparent 25%),
                              linear-gradient(45deg, #86bdf0 25%, transparent 25%),
                              linear-gradient(315deg, #86bdf0 25%, #92ccff 25%);
            background-size: 20px 20px;
            background-position: 10px 0, 10px 0, 0 0, 0 0;
        }
    </style>
</head>
<body class="pixel-bg min-h-screen">
    <!-- Notifications Container -->
    <div id="notifications" class="fixed top-4 right-4 z-[9999] space-y-3 max-w-sm w-full"></div>

    <!-- App Container -->
    <div id="app">
            <!-- Login Page will be shown first -->
        </div>
        
        <div id="loading-overlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] hidden">
            <div id="loading-content" class="bg-white rounded-3xl p-10 max-w-md w-full mx-4 shadow-2xl animate-fade-in">
                <!-- Content will be injected here -->
            </div>
        </div>

    <script>
        // ==================== DATA STORAGE ====================
        const DB = {
            users: JSON.parse(localStorage.getItem('pos_users')) || [
                { id: 1, name: 'Admin User', email: 'admin@pos.com', password: 'admin123', role: 'admin' },
                { id: 2, name: 'Cashier User', email: 'cashier@pos.com', password: 'cashier123', role: 'cashier' }
            ],
            products: JSON.parse(localStorage.getItem('pos_products')) || [
                { id: 1, name: 'Cheeseburger', price: 120, image: 'https://i.pinimg.com/1200x/6b/33/b3/6b33b3ebbea738d05396ba661ce152d6.jpg', stock: 50 },
                { id: 2, name: 'French Fries', price: 75, image: 'https://i.pinimg.com/736x/36/85/8c/36858c64c7beda9efd7dc3f0240ec3b5.jpg', stock: 100 },
                { id: 3, name: 'Coke', price: 50, image: 'https://i.pinimg.com/736x/22/c0/e9/22c0e9c2f0d4fd6d5acb3b8938b45d09.jpg', stock: 100 },
                { id: 4, name: 'Ice Cream', price: 60, image: 'https://i.pinimg.com/1200x/73/01/91/730191e138bb8071d78a240d813623b1.jpg', stock: 80 },
                { id: 5, name: 'Pizza Slice', price: 100, image: 'https://i.pinimg.com/736x/46/9f/76/469f76eb738dd6c1991dd89b9489d897.jpg', stock: 40 }
            ],
            orders: JSON.parse(localStorage.getItem('pos_orders')) || [],
            currentUser: JSON.parse(localStorage.getItem('pos_current_user')) || null,
            passwordResetTokens: {}
        };

        function saveToDB() {
            localStorage.setItem('pos_users', JSON.stringify(DB.users));
            localStorage.setItem('pos_products', JSON.stringify(DB.products));
            localStorage.setItem('pos_orders', JSON.stringify(DB.orders));
            localStorage.setItem('pos_current_user', JSON.stringify(DB.currentUser));
        }

        // ==================== NOTIFICATION SYSTEM ====================
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notifications');
            const id = Date.now();
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            
            const icons = {
                success: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>',
                error: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>',
                warning: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                info: '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
            };

            const notification = document.createElement('div');
            notification.id = `notification-${id}`;
            notification.className = `notification ${colors[type]} text-white p-4 rounded-xl shadow-lg flex items-center gap-3`;
            notification.innerHTML = `
                ${icons[type]}
                <span class="font-medium flex-1">${message}</span>
                <button onclick="hideNotification(${id})" class="hover:opacity-80">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => hideNotification(id), 5000);
        }

        function hideNotification(id) {
            const notification = document.getElementById(`notification-${id}`);
            if (notification) {
                notification.classList.add('notification-exit');
                setTimeout(() => notification.remove(), 300);
            }
        }

        // ==================== AUTH FUNCTIONS ====================
        let currentPage = DB.currentUser ? 'dashboard' : 'login';
        let showPassword = { login: false, register: false, reset: false, 'edit-user': false };
        let cart = [];

        // ==================== RENDER FUNCTIONS ====================
        function render() {
            const app = document.getElementById('app');
            
            let content = '';
            switch(currentPage) {
                case 'login':
                    content = renderLoginPage();
                    break;
                case 'register':
                    content = renderRegisterPage();
                    break;
                case 'forgot-password':
                    content = renderForgotPasswordPage();
                    break;
                case 'reset-password':
                    content = renderResetPasswordPage();
                    break;
                case 'dashboard':
                    content = renderDashboard();
                    break;
                case 'admin':
                    content = renderAdminDashboard();
                    break;
            }
            

            
            app.innerHTML = content;
            
            // Initialize password toggle icons after content is loaded
            setTimeout(() => {
                initializePasswordToggleIcons();
                resetRecaptcha();
            }, 100);
        }

        function resetRecaptcha() {
            // Check if grecaptcha is available
            if (typeof grecaptcha !== 'undefined') {
                // Try to reset all reCAPTCHA widgets
                try {
                    grecaptcha.reset();
                } catch (e) {
                    // If reset fails, re-render the widget
                    const recaptchaElements = document.querySelectorAll('.g-recaptcha');
                    recaptchaElements.forEach(el => {
                        const sitekey = el.getAttribute('data-sitekey');
                        if (sitekey) {
                            el.innerHTML = '';
                            grecaptcha.render(el, { 'sitekey': sitekey });
                        }
                    });
                }
            }
        }

        // -------------------- LOGIN PAGE --------------------
        function renderLoginPage() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4" style="background-image: url('bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">
                    <div class="bg-yellow-200 pixel-box overflow-hidden max-w-4xl w-full flex flex-col md:flex-row animate-fade-in">
                        <div class="p-8 md:w-1/2 flex flex-col justify-center items-center text-white pixel-box" style="background-image: url('https://cdn.dribbble.com/userupload/27196923/file/original-d1383b580a7a48535347238b8da72ea3.gif'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                            <div class="w-full h-full flex items-center justify-center">
                                <!-- GIF background covers the entire area -->

                        </div>
                        
                        <div class="p-8 md:w-1/2 bg-yellow-100">

                                </div>
                            </div>
                            
                            <div class="text-center mb-6">
                                <h2 class="text-xl font-bold text-slate-800 mb-2">SIGN IN</h2>
                                <p class="text-xs text-slate-600">ACCESS PIXEL POS</p>
                            </div>
                            
                            <form id="loginForm" class="space-y-4">
                                <div>
                                    <label class="block text-xs text-slate-800 mb-2 font-bold">EMAIL</label>
                                    <input type="email" id="loginEmail" required class="w-full px-4 py-3 border-4 border-slate-800 input-focus focus:border-purple-600 focus:outline-none pixel-box text-xs bg-white" placeholder="ENTER YOUR EMAIL">
                                </div>
                                
                                <div>
                                    <label class="block text-xs text-slate-800 mb-2 font-bold">PASSWORD</label>
                                    <div class="relative">
                                        <input type="password" id="loginPassword" required class="w-full px-4 py-3 border-4 border-slate-800 input-focus focus:border-purple-600 focus:outline-none pixel-box text-xs pr-12 bg-white" placeholder="ENTER YOUR PASSWORD">
                                        <button type="button" id="loginToggleBtn" onclick="toggleShowPassword('login')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-800">
                                            <div class="text-xs font-bold" id="loginToggleIcon"></div>

                                </div>

                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        // -------------------- REGISTER PAGE --------------------
        function renderRegisterPage() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4" style="background-image: url('bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">

                        <div class="p-8 md:w-1/2 bg-yellow-100">
                            <div class="flex justify-center mb-6">

                                <div>

                                    <input type="email" id="registerEmail" required class="w-full px-4 py-3 border-4 border-slate-800 input-focus focus:border-purple-600 focus:outline-none pixel-box text-xs bg-white" placeholder="ENTER YOUR EMAIL">
                                </div>
                                
                                <div>
                                    <label class="block text-xs text-slate-800 mb-2 font-bold">PASSWORD</label>
                                    <div class="relative">
                                        <input type="password" id="registerPassword" required class="w-full px-4 py-3 border-4 border-slate-800 input-focus focus:border-purple-600 focus:outline-none pixel-box text-xs pr-12 bg-white" placeholder="CREATE A PASSWORD">
                                        <button type="button" id="registerToggleBtn" onclick="toggleShowPassword('register')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-800">
                                            <div class="text-xs font-bold" id="registerToggleIcon"></div>

                                <button type="submit" class="w-full bg-green-500 text-white py-3 pixel-btn text-xs font-bold">

                            <p class="text-center mt-6 text-slate-600 text-xs">

                            </p>
                        </div>
                        
                        <div class="p-8 md:w-1/2 flex flex-col justify-center items-center text-white pixel-box" style="background-image: url('https://assets.dochipo.com/editor/animations/sign-up/5d74eac1-b2d1-4cdc-bdbe-319003066288.gif'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                            <div class="w-full h-full flex items-center justify-center">
                                <!-- GIF background covers the entire area -->
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // -------------------- FORGOT PASSWORD PAGE --------------------
        function renderForgotPasswordPage() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4" style="background-image: url('bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full p-8 animate-fade-in">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-blue-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                                </svg>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-800 mb-2">Forgot Password?</h2>
                            <p class="text-slate-500">Enter your email to reset your password</p>
                        </div>
                        
                        <form id="forgotPasswordForm" class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                                <input type="email" id="forgotEmail" required class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none transition-all" placeholder="Enter your email">
                            </div>
                            
                            <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" data-callback="onRecaptchaSuccess"></div>
                            
                            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-bold text-lg hover:opacity-90 transition-opacity shadow-lg">
                                Send Reset Link
                            </button>
                        </form>
                        
                        <p class="text-center mt-6 text-slate-600">
                            <button onclick="currentPage='login'; render()" class="text-blue-600 hover:text-blue-700 font-bold">Back to Login</button>
                        </p>
                    </div>
                </div>
            `;
        }

        // -------------------- RESET PASSWORD PAGE --------------------
        function renderResetPasswordPage() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4" style="background-image: url('bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full p-8 animate-fade-in">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-green-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                                </svg>
                            </div>
                            <h2 class="text-3xl font-bold text-slate-800 mb-2">Reset Password</h2>
                            <p class="text-slate-500">Enter your new password</p>
                        </div>
                        
                        <form id="resetPasswordForm" class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                                <input type="email" id="resetEmail" required class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none transition-all" placeholder="Enter your email">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">New Password</label>
                                <div class="relative">
                                    <input type="password" id="resetPassword" required class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl input-focus focus:border-blue-500 focus:outline-none transition-all pr-12" placeholder="Enter new password">
                                    <button type="button" id="resetToggleBtn" onclick="toggleShowPassword('reset')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <svg class="w-5 h-5" id="resetToggleIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    </button>
                                </div>
                            </div>
                            
                            <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-3 rounded-xl font-bold text-lg hover:opacity-90 transition-opacity shadow-lg">
                                Reset Password
                            </button>
                        </form>
                        
                        <p class="text-center mt-6 text-slate-600">
                            <button onclick="currentPage='login'; render()" class="text-blue-600 hover:text-blue-700 font-bold">Back to Login</button>
                        </p>
                    </div>
                </div>
            `;
        }

        // Sidebar visibility state for mobile
        let sidebarOpen = false;
        // Loading and progress state
        let loadingState = {
            isLoading: false,
            isSuccess: false,
            progress: 0,
            message: '',
            successMessage: ''
        };
        
        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            render();
        }

        // Helper to get overlay elements
        function getLoadingOverlay() {
            return {
                overlay: document.getElementById('loading-overlay'),
                content: document.getElementById('loading-content')
            };
        }

        // Show loading with progress
        function showLoading(message = 'Processing...') {
            loadingState.isLoading = true;
            loadingState.isSuccess = false;
            loadingState.progress = 0;
            loadingState.message = message;
            
            const { overlay, content } = getLoadingOverlay();
            content.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="w-20 h-20 border-4 border-sky-200 border-t-sky-500 rounded-full animate-spin mb-6"></div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">${loadingState.message}</h3>
                    <div class="w-full bg-slate-200 rounded-full h-4 mb-2">
                        <div id="progress-bar" class="bg-gradient-to-r from-sky-500 to-blue-500 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <span id="progress-text" class="text-3xl font-bold bg-gradient-to-r from-sky-600 to-blue-600 bg-clip-text text-transparent">0%</span>
                </div>
            `;
            overlay.classList.remove('hidden');
        }

        // Update progress
        function updateProgress(percent, message = '') {
            loadingState.progress = percent;
            if (message) loadingState.message = message;
            
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            if (progressBar) progressBar.style.width = `${percent}%`;
            if (progressText) progressText.textContent = `${percent}%`;
        }

        // Hide loading
        function hideLoading() {
            loadingState.isLoading = false;
            loadingState.progress = 0;
            const { overlay } = getLoadingOverlay();
            overlay.classList.add('hidden');
        }

        // Transition loading to success
        function showSuccessAndHide(successMsg) {
            loadingState.isLoading = false;
            loadingState.isSuccess = true;
            loadingState.successMessage = successMsg;
            
            const { content } = getLoadingOverlay();
            content.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">

        // Simulate async operation
        function simulateAsync(progressCallback, duration = 2000) {
            return new Promise(resolve => {
                let startTime = Date.now();
                let interval = setInterval(() => {
                    let elapsed = Date.now() - startTime;
                    let progress = Math.min(Math.floor((elapsed / duration) * 100), 100);
                    progressCallback(progress);
                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(resolve, 100);
                    }
                }, 50);
            });
        }

        // Delete single order

            if (!confirm('Are you sure you want to delete this order?')) return;
            
            showLoading('Deleting order...');
            await simulateAsync((p) => updateProgress(p, `Deleting... ${p}%`), 1000);
            
            DB.orders = DB.orders.filter(o => o.id !== orderId);
            saveToDB();
            
            showSuccessAndHide('Order deleted!');
            showNotification('Order deleted successfully!', 'success');
            render();
        }

            if (showPassword[field]) {
                // Visible state - pixel art eye open
                icon.innerHTML = `

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = DB.users.find(u => u.email === email && u.password === password);

                await simulateAsync((p) => updateProgress(p, `Signing in... ${p}%`), 2000);
                DB.currentUser = user;
                saveToDB();
                currentPage = 'dashboard';
                cart = [];
                showSuccessAndHide('Signed in!');
                showNotification('Login successful!', 'success');
                render();
            } else {
                showNotification('Invalid email or password!', 'error');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            const existingUser = DB.users.find(u => u.email === email);
            
            if (existingUser) {
                showNotification('Email already exists!', 'error');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                name,
                email,
                password,
                role: 'cashier'
            };
            
            DB.users.push(newUser);
            saveToDB();
            showNotification('Account created successfully!', 'success');
            currentPage = 'login';
            render();
        }

            const email = document.getElementById('forgotEmail').value;
            
            const user = DB.users.find(u => u.email === email);
            
            if (user) {
                showNotification('Password reset link sent! (Demo: Redirecting to reset page)', 'success');
                currentPage = 'reset-password';
                render();
            } else {
                showNotification('Email not found!', 'error');

            const email = document.getElementById('resetEmail').value;
            const newPassword = document.getElementById('resetPassword').value;
            
            const userIndex = DB.users.findIndex(u => u.email === email);
            
            if (userIndex !== -1) {

                showNotification('Password reset successful!', 'success');

            DB.products = DB.products.filter(p => p.id !== productId);

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            showLoading('Deleting user...');
            await simulateAsync((p) => updateProgress(p, `Deleting... ${p}%`), 1000);
            
            DB.users = DB.users.filter(u => u.id !== userId);
            saveToDB();
            
            showSuccessAndHide('User deleted!');
            showNotification('User deleted successfully!', 'success');
            render();
        }

        // ==================== CART FUNCTIONS ====================
        function addToCart(productId) {
            const product = DB.products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                if (existingItem.quantity < product.stock) {
                    existingItem.quantity++;
                } else {
                    showNotification('Not enough stock!', 'warning');
                    return;
                }
            } else {
                if (product.stock > 0) {
                    cart.push({ ...product, quantity: 1 });
                } else {
                    showNotification('Product out of stock!', 'warning');
                    return;
                }
            }
            
            showNotification(`${product.name} added to cart!`, 'success');
            render();
        }

        function updateQuantity(productId, quantity) {
            const product = DB.products.find(p => p.id === productId);
            
            if (quantity <= 0) {
                removeFromCart(productId);
                return;
            }
            
            const item = cart.find(i => i.id === productId);
            if (item && quantity <= product.stock) {
                item.quantity = quantity;
                render();
            } else if (quantity > product.stock) {
                showNotification('Not enough stock!', 'warning');
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            render();
        }

        // ==================== CHECKOUT FUNCTIONS ====================
        function openCheckoutModal() {
            const modal = document.getElementById('checkout-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('cash-input').value = '';
            document.getElementById('change-display').classList.add('hidden');
            document.getElementById('insufficient-cash').classList.add('hidden');
            document.getElementById('confirm-checkout').disabled = true;
        }

        function closeCheckoutModal() {
            const modal = document.getElementById('checkout-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function validateCash() {
            const cash = parseFloat(document.getElementById('cash-input').value) || 0;
            const total = calculateTotal();
            const change = cash - total;
            
            const changeDisplay = document.getElementById('change-display');
            const insufficientCash = document.getElementById('insufficient-cash');
            const confirmBtn = document.getElementById('confirm-checkout');
            
            if (cash >= total) {
                document.getElementById('change-amount').textContent = `₱${change.toFixed(2)}`;
                changeDisplay.classList.remove('hidden');
                insufficientCash.classList.add('hidden');
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                if (cash > 0) {
                    insufficientCash.classList.remove('hidden');
                }
                confirmBtn.disabled = true;
            }
        }

        function confirmCheckout() {
            const cash = parseFloat(document.getElementById('cash-input').value);
            const total = calculateTotal();
            
            cart.forEach(item => {
                const product = DB.products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.quantity;
                }
            });
            
            const newOrder = {
                id: Date.now(),
                items: [...cart],
                total,
                cash,
                change: cash - total,
                date: new Date().toISOString(),
                cashier: DB.currentUser.name
            };
            
            DB.orders.push(newOrder);
            saveToDB();
            
            closeCheckoutModal();
            showReceipt(newOrder);
            cart = [];
            render();
        }

        function showReceipt(order) {
            const modal = document.getElementById('receipt-modal');
            const receiptContent = document.getElementById('receipt-content');
            
            receiptContent.innerHTML = `
                <div class="text-center mb-6 pb-4 border-b-2 border-dashed border-slate-300">
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">Modern POS</h3>
                    <p class="text-sm text-slate-500">${new Date(order.date).toLocaleString()}</p>
                    <p class="text-sm text-slate-500">Cashier: ${order.cashier}</p>
                </div>
                <div class="space-y-2 mb-6">
                    ${order.items.map(item => `
                        <div class="flex justify-between items-center py-1">
                            <span class="text-slate-700">${item.name} x${item.quantity}</span>
                            <span class="font-semibold text-slate-800">₱${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="border-t-2 border-slate-300 pt-4 space-y-2">
                    <div class="flex justify-between font-bold text-lg">
                        <span class="text-slate-700">Total:</span>
                        <span class="text-blue-600">₱${order.total.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-600">Cash:</span>
                        <span class="font-semibold text-slate-800">₱${order.cash.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between font-bold text-xl pt-2 border-t border-slate-200">
                        <span class="text-green-600">Change:</span>
                        <span class="text-green-600">₱${order.change.toFixed(2)}</span>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeReceiptModal() {
            const modal = document.getElementById('receipt-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }



        async function logout() {
            showLoading('Logging out...');
            await simulateAsync((p) => updateProgress(p, `Logging out... ${p}%`), 1500);
            DB.currentUser = null;
            saveToDB();
            cart = [];
            currentPage = 'login';
            showSuccessAndHide('Logged out!');
            showNotification('Logged out successfully!', 'success');
            render();
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'loginForm') {
                handleLogin(e);
            } else if (e.target.id === 'registerForm') {
                handleRegister(e);
            } else if (e.target.id === 'forgotPasswordForm') {
                handleForgotPassword(e);
            } else if (e.target.id === 'resetPasswordForm') {
                handleResetPassword(e);
            } else if (e.target.id === 'add-product-form') {
                handleAddProduct(e);
            } else if (e.target.id === 'edit-product-form') {
                handleEditProduct(e);
            } else if (e.target.id === 'edit-user-form') {
                if (editUserId === -1) {
                    handleAddUser(e);
                } else {
                    handleEditUser(e);
                }
            }
        });

        document.addEventListener('click', function(e) {
            if (e.target.id === 'checkout-modal') {
                closeCheckoutModal();
            } else if (e.target.id === 'receipt-modal') {
                closeReceiptModal();
            } else if (e.target.id === 'product-modal') {
                closeEditProductModal();
            } else if (e.target.id === 'edit-user-modal') {
                closeEditUserModal();
            }
        });
        
        function showAddProductModal() {
            editProductId = -1;
            render();
        }
        
        function closeAddProductModal() {
            editProductId = null;
            render();
        }

        // ==================== INITIALIZE ====================
        render();
    </script>
</body>
</html>
